<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="page-title">Portfolio</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet"
    />
    
    
  
<link rel="stylesheet" href="css/styles.css">
</head>
  <body>
    <div class="bg-noise"></div>
    <div class="bg-glows">
      <div class="glow-blob glow-blob-1 parallax-layer parallax-layer-1"></div>
      <div class="glow-blob glow-blob-2 parallax-layer parallax-layer-2"></div>
      <div class="glow-blob glow-blob-3 parallax-layer parallax-layer-3"></div>
    </div>
    <div class="grid-overlay">
      <div class="grid-container">
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
      </div>
    </div>
    <nav class="floating-nav">
      <div class="nav-logo" id="nav-logo"></div>
      <div class="nav-links" id="nav-links"></div>
    </nav>
    <div class="fixed-cta" id="fixed-cta"></div>
    <div class="content-wrapper">
      <section class="hero-section">
        <div class="hero-super-header" id="hero-super-header"></div>
        <div class="hero-title-container">
          <div class="reveal-mask">
            <h1 class="hero-title-line magnetic-text-target" id="title-line-1"></h1>
          </div>
          <div class="reveal-mask">
            <h1 class="hero-title-line magnetic-text-target" id="title-line-2"></h1>
          </div>
        </div>
        <div class="hero-description-box">
          <p class="hero-subtitle" id="hero-subtitle"></p>
        </div>
        <div class="hero-actions" id="hero-actions"></div>
      </section>
      <section class="about-section" id="about">
        <div class="reveal-mask">
          <h2 class="section-title reveal-text">About</h2>
        </div>
        <p class="about-text" id="about-text"></p>
      </section>
      <section class="projects-section" id="projects">
        <div class="reveal-mask">
          <h2 class="section-title reveal-text">Projects</h2>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
      </section>
      <section class="services-section" id="services">
        <div class="services-sticky">
          <div class="reveal-mask">
            <h2 class="section-title reveal-text">Services</h2>
          </div>
        </div>
        <div class="services-content" id="services-content"></div>
      </section>
      <section class="case-studies-section" id="case-studies">
        <div class="reveal-mask">
          <h2 class="section-title reveal-text">Case Studies</h2>
        </div>
        <div class="case-studies-grid" id="case-studies-grid"></div>
      </section>
      <section class="testimonials-section">
        <div class="reveal-mask">
          <h2 class="section-title reveal-text">Testimonials</h2>
        </div>
        <div class="testimonials-grid" id="testimonials-grid"></div>
      </section>
      <!-- Skills Ticker Section -->
      <section class="ticker-section">
        <div class="ticker-wrapper">
          <div class="ticker-track" id="ticker-track"></div>
        </div>
      </section>
      <footer class="footer-section" id="contact">
        <h2 class="footer-cta" id="footer-cta"></h2>
        <a class="footer-email" href="" id="footer-email"> </a>
        <div class="footer-bottom">
          <div class="footer-copyright" id="footer-copyright"></div>
          <div class="footer-credits" id="footer-credits"></div>
        </div>
      </footer>
    </div>
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close">×</button>
      <button class="lightbox-prev" id="lightbox-prev">❮</button>
      <button class="lightbox-next" id="lightbox-next">❯</button>
      <div class="lightbox-content">
        <img alt="" class="lightbox-image" id="lightbox-image" src="" />
      </div>
      <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>
    </div>
    
    
  

<script src="js/scripts.js"></script>
</body>
</html>
